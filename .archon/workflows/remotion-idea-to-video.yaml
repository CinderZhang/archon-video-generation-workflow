name: remotion-idea-to-video
description: |
  Generate a short Remotion video from a source URL and add it to the repo's
  persistent Remotion library. Every run drops a new composition under
  `src/<Slug>/` and audio under `public/<media>/<Slug>/`, so Studio opened
  against the repo shows every video ever generated, side by side.

  Four modes, selected via `$ARGUMENTS`:
    "hn"                            — auto-pick today's top HN front-page story
    "hn <url>" | "article <url>"    — treat the given URL as an article
    "marketing <url>"               — treat the given URL as a product/brand
                                      and build a pitch video
    "idea <free-form prompt>"       — describe the topic/idea in plain English
                                      and build an explainer video from it
                                      (no URL, no fetch — your prompt IS the brief)

  hn/article mode: video is ABOUT THE ARTICLE'S IDEAS. No references to HN
  metadata (points, comments, platform) or to the source publication.

  marketing mode: video PITCHES the product. Hook on the problem it solves,
  scenes 2–4 showcase benefits, final scene is a CTA pointing at the URL or
  domain. Enthusiastic but factual — no fabricated features or testimonials.

  idea mode: video is ABOUT THE TOPIC THE USER DESCRIBED. The prompt text
  itself is the brief — no URL is fetched. No CTA unless the prompt asks
  for one. Don't fabricate specifics (numbers, products, testimonials)
  beyond what the prompt implies. Don't reference the user, "the prompt",
  or "the request" on screen — make the video, not commentary on it.

  Requires the `remotion-best-practices` skill
  (`npx skills add remotion-dev/skills --yes`). The `visual-diagrams` skill
  is used if the plan chooses a diagram-heavy scene.

  The Remotion project at the repo root is bootstrapped on the first run
  (`ensure-remotion-project`). Subsequent runs detect it and skip scaffold.
  You never scaffold manually — let the workflow do it.

  Audio is layered and every layer is OPT-IN via env:
    Voice (TTS):   VOICE_PROVIDER = cartesia | elevenlabs | none  (auto)
    Music (BGM):   MUSIC_PROVIDER = elevenlabs | none             (opt-in)
    SFX:           SFX_PROVIDER   = elevenlabs | none             (opt-in)

  Brand overlay is optional — drop a `.archon/brand.yaml` (see
  `.archon/brand.example.yaml`) to control palette / font / logo / voice
  tone / music mood. Missing file ⇒ neutral defaults.

  Archive: when `RENDER_ENABLED=true` (default), the final mp4 is rendered
  and copied to `./videos/<YYYY-MM-DD>-<slug>/<slug>.mp4` alongside the
  plan / narration / findings / manifests. `./videos/` is gitignored by
  default — flip that to track renders.

  Empty `$ARGUMENTS` defaults to `hn` (auto-pick top story), matching the
  previous behaviour.

provider: claude
model: sonnet

nodes:
  # ── Layer 0: Preflight ─────────────────────────────────────────────

  - id: check-skill
    bash: |
      set -eu
      if   [ -e ".claude/skills/remotion-best-practices/SKILL.md" ] \
        || [ -e ".agents/skills/remotion-best-practices/SKILL.md" ] \
        || [ -e "$HOME/.claude/skills/remotion-best-practices/SKILL.md" ]; then
        echo "remotion-best-practices: installed"
      else
        cat >&2 <<'MSG'
      FATAL: the remotion-best-practices skill is not installed.

      Install once with:

          npx skills add remotion-dev/skills --yes

      Then re-run this workflow.
      MSG
        exit 1
      fi

      if   [ -e ".claude/skills/visual-diagrams/SKILL.md" ] \
        || [ -e "$HOME/.claude/skills/visual-diagrams/SKILL.md" ]; then
        echo "visual-diagrams: installed"
      else
        echo "visual-diagrams: not installed (diagrams will be disabled)"
      fi
    timeout: 15000

  # ── Layer 1: Fetch source + bootstrap Remotion project (parallel) ─

  - id: fetch-source
    prompt: |
      Parse the workflow arguments, fetch the source material, and write
      two artifacts the rest of the workflow consumes.

      ── Arguments ──────────────────────────────────────────────────────

      Raw `$ARGUMENTS` passed by the user: "$ARGUMENTS"

      Format: `<mode> [url-or-prompt-text]`
        mode = `hn` | `article` | `marketing` | `idea`   (default: `hn`)
        For `hn`         : optional URL (auto-pick HN top story if omitted).
        For `article`    : URL is required.
        For `marketing`  : URL is required.
        For `idea`       : everything after the `idea` token is treated as
                           a free-form plain-English prompt — NOT a URL.
                           No fetching. The prompt IS the brief.
        `article` is a synonym for `hn` when a URL is explicitly given —
        both yield an article-style explainer video.

      Parsing rules:
      - Empty or whitespace-only ARGUMENTS → `mode=hn`, no URL.
      - If the first whitespace-separated token is `hn` / `article` /
        `marketing` / `idea`, that is the mode. Otherwise treat the first
        token as an error (print FATAL and exit).
      - For `hn` / `article` / `marketing`: the second token, if present,
        is the URL. It MUST look like `http(s)://...`. Reject anything
        else with a FATAL message. `marketing` without a URL is FATAL.
        `article` without a URL is FATAL.
      - For `idea`: the rest of the line (everything after the `idea`
        token, with leading whitespace trimmed) is the prompt. It must
        be non-empty (FATAL otherwise). The prompt may contain spaces,
        URLs, or any text — pass it through verbatim. Do NOT WebFetch
        anything in idea mode.

      ── Steps by mode ──────────────────────────────────────────────────

      1. **hn (no URL)**: WebFetch
         `https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=1`.
         Extract the top hit's `title` and `url`. If it has a URL,
         WebFetch that URL for the article body. If no URL (Ask HN post),
         use `story_text` as the body. If both are absent, use the title
         alone and note that explicitly at the top of `article-body.md`.
         `source_type` = `hn_algolia`.

      2. **hn (with URL) / article**: WebFetch the given URL. Extract the
         article's title and readable body. Strip navigation, ads, cookie
         banners, footer. `source_type` = `article_url`.

      3. **marketing**: WebFetch the given URL. Extract a structured brief
         suitable for a product pitch, not a wall of copy. The brief should
         capture:
         - Product / brand name (as best you can infer from the page)
         - One-sentence positioning (what it is, who it's for)
         - Value proposition — 1–3 sentences
         - 3–8 key features or capabilities (if the page lists them)
         - Primary CTA or action (e.g. "Install with npx ...", "Try it free",
           "Book a demo"). If no explicit CTA, use the domain as the CTA.
         - Tone / vibe of the site (technical / playful / enterprise / etc.)
         `source_type` = `marketing_site`.

      4. **idea**: NO WebFetch. The user's prompt is the brief. Do this:
         - Generate a punchy, neutral, ≤ 60-character `title` from the
           prompt. Title-case. No quotes, no trailing punctuation. Examples:
             prompt = "vector databases vs traditional databases for ML"
               → title = "Vector Databases vs Traditional Databases"
             prompt = "explain how oauth pkce works for backend engineers"
               → title = "How OAuth PKCE Works"
         - `url` = `""` (empty string).
         - `source_type` = `user_idea`.
         - `article-body.md` content: write the user's prompt verbatim
           as the first line, then a section `## What the user wants`
           with 2–4 bullets capturing your interpretation of the topic
           scope, implied audience, and depth (e.g. "Audience: backend
           engineers familiar with HTTP", "Depth: conceptual, not a
           tutorial"). Do NOT invent specific numbers, products, or
           claims that aren't in the prompt. If the prompt is vague,
           keep the bullets vague — let `plan-video` decide angles.

      ── Artifacts to write ─────────────────────────────────────────────

      1. `$ARTIFACTS_DIR/article.json` — exact schema:

             {
               "mode": "hn" | "article" | "marketing" | "idea",
               "title": "<string>",
               "url": "<string or empty>",
               "source_type": "hn_algolia" | "article_url" | "marketing_site" | "user_idea"
             }

         Keep it exactly these four top-level fields. Downstream nodes
         (music script, summarize, archive) read `title` and `url`.
         For `idea` mode, `url` is `""`.

      2. `$ARTIFACTS_DIR/article-body.md` — plain text or markdown.
         - For hn/article: the extracted article content, cleaned up.
         - For marketing: the structured brief described above, with
           clear section headers (Product, Positioning, Value, Features,
           CTA, Tone).
         - For idea: the verbatim user prompt + a short `## What the
           user wants` interpretation as described in step 4 above.

      Then emit your final message as a JSON object matching the output
      schema (mode, title, url, source_type). Downstream nodes read this
      via `$fetch-source.output.mode` etc.
    output_format:
      type: object
      properties:
        mode:
          type: string
          enum: [hn, article, marketing, idea]
        title:
          type: string
        url:
          type: string
        source_type:
          type: string
          enum: [hn_algolia, article_url, marketing_site, user_idea]
      required: [mode, title, url, source_type]
    depends_on: [check-skill]
    idle_timeout: 300000

  - id: derive-slug
    bash: |
      set -euo pipefail
      TITLE=$(jq -r '.title' "$ARTIFACTS_DIR/article.json")

      # PascalCase slug for the composition ID (Remotion requires letters, digits, no dashes).
      COMP_ID=$(printf '%s' "$TITLE" \
        | LC_ALL=C tr '[:upper:]' '[:lower:]' \
        | LC_ALL=C sed -E 's/[^a-z0-9]+/ /g' \
        | awk '{for(i=1;i<=NF;i++){ $i = toupper(substr($i,1,1)) substr($i,2) }; print}' \
        | LC_ALL=C tr -d ' ' \
        | cut -c1-48)

      if [ -z "$COMP_ID" ] || ! printf '%s' "$COMP_ID" | grep -qE '^[A-Za-z]'; then
        COMP_ID="Story$(date +%s)"
      fi

      FS_SLUG=$(printf '%s' "$TITLE" \
        | LC_ALL=C tr '[:upper:]' '[:lower:]' \
        | LC_ALL=C sed -E 's/[^a-z0-9]+/-/g' \
        | LC_ALL=C sed -E 's/^-+|-+$//g' \
        | cut -c1-64)
      [ -z "$FS_SLUG" ] && FS_SLUG="story-$(date +%s)"

      DATE=$(date +%Y-%m-%d)

      mkdir -p "$ARTIFACTS_DIR"
      cat > "$ARTIFACTS_DIR/slug.json" <<EOF
      {
        "composition_id": "$COMP_ID",
        "fs_slug": "$FS_SLUG",
        "date": "$DATE",
        "archive_dirname": "$DATE-$FS_SLUG"
      }
      EOF

      echo "composition_id=$COMP_ID"
      echo "fs_slug=$FS_SLUG"
      echo "archive_dirname=$DATE-$FS_SLUG"
    depends_on: [fetch-source]
    timeout: 10000

  - id: ensure-remotion-project
    bash: |
      set -euo pipefail

      # Detect an existing Remotion project at the repo root.
      HAS_REMOTION=false
      if [ -f package.json ] && [ -f src/Root.tsx ]; then
        if jq -e '.dependencies.remotion // .devDependencies.remotion' package.json > /dev/null 2>&1; then
          HAS_REMOTION=true
        fi
      fi

      if [ "$HAS_REMOTION" = "true" ]; then
        echo "Remotion project already present at $(pwd) — skipping scaffold."
      else
        echo "No Remotion project detected — scaffolding into repo root."

        # Scaffold into a sibling temp dir so create-video doesn't refuse a
        # non-empty target. We then copy contents into cwd — but STRIP the
        # scaffold's own .git/ and .gitignore/ first, because cp -R would
        # otherwise clobber the host repo's version of each.
        TMP=$(mktemp -d)
        trap 'rm -rf "$TMP"' EXIT
        npx --yes create-video@latest --yes --blank --no-tailwind "$TMP/_project"

        # Protect the host repo's curated files.
        rm -rf "$TMP/_project/.git"
        rm -f  "$TMP/_project/.gitignore"
        # README.md is the scaffold's boilerplate; keep the repo's if it exists.
        [ -f README.md ] && rm -f "$TMP/_project/README.md"

        # Copy remaining scaffold files into cwd (repo root).
        cp -R "$TMP/_project/." .

        echo "Scaffolded files:"
        ls -1 package.json remotion.config.ts tsconfig.json src/Root.tsx 2>/dev/null || true

        # Overwrite Root.tsx with a stable pattern that imports from a
        # generated registry. import.meta.glob is Vite-only and breaks under
        # Remotion's Webpack bundler at runtime; a static generated registry
        # is bundler-agnostic and tsc-clean under any config.
        cat > src/Root.tsx <<'TSX'
      // Stable root — do not edit. Compositions are registered through
      // src/compositions.gen.ts, which is regenerated each workflow run
      // by the `regenerate-registry` node.
      import React from 'react';
      import { Composition } from 'remotion';
      import entries from './compositions.gen';

      export const RemotionRoot: React.FC = () => (
        <>
          {entries.map((e) => (
            <Composition
              key={e.id}
              id={e.id}
              component={e.component}
              width={e.width}
              height={e.height}
              fps={e.fps}
              durationInFrames={e.durationInFrames}
              defaultProps={e.defaultProps}
              calculateMetadata={e.calculateMetadata}
            />
          ))}
        </>
      );
      TSX

        # Seed compositions.gen.ts empty so tsc passes before the first
        # composition is added. `regenerate-registry` overwrites it later.
        cat > src/compositions.gen.ts <<'TSX'
      // GENERATED — do not edit. Regenerated by the `regenerate-registry`
      // workflow node by scanning src/<Slug>/index.ts files.
      import type React from 'react';

      type CompMeta = {
        id: string;
        component: React.ComponentType<any>;
        width: number;
        height: number;
        fps: number;
        durationInFrames: number;
        defaultProps?: Record<string, unknown>;
        calculateMetadata?: any;
      };

      const entries: CompMeta[] = [];
      export default entries;
      TSX
      fi

      # Install deps (idempotent; pnpm content-addressed store keeps this fast).
      if command -v pnpm >/dev/null 2>&1; then
        pnpm install --prefer-offline
      elif command -v bun >/dev/null 2>&1; then
        bun install
      else
        npm install --no-audit --no-fund
      fi

      echo "PROJECT_ROOT=$(pwd)"
    depends_on: [check-skill]
    timeout: 600000

  # ── Layer 2: Plan (content-focused, hook-first, diagram-aware) ─────

  - id: plan-video
    prompt: |
      You are planning a short Remotion video. The source material and its
      mode have already been fetched by the upstream `fetch-source` node.

      ── Source material ─────────────────────────────────────────────────

      Source metadata:
      $fetch-source.output

      Source fields are authoritative:
      - `mode` — `hn` | `article` | `marketing` | `idea` (drives the planning rules below)
      - `title` — subject / product name / topic
      - `url` — source URL (empty string for `idea` mode)
      - `source_type` — provenance tag

      Full body is already on disk at `$ARTIFACTS_DIR/article-body.md`. Read
      it before planning. Do NOT re-fetch the URL — fetch-source did that.

      Slug + composition ID already derived upstream (use verbatim):
      $derive-slug.output

      ── Shared constraints (all modes) ──────────────────────────────────

      - **3–5 scenes**, total target 30–60 seconds silent / dictated by
        voice length if voice is enabled (builder uses calculateMetadata).
      - 30fps, 1920×1080.
      - Scene IDs are stable: `scene1`, `scene2`, ...
      - On-screen text supports narration — not a transcript.
      - Composition ID and fs slug come from `$derive-slug.output` verbatim.
      - No factual claims you can't back from `article-body.md`.
      - **Transitions are NOT optional.** Scenes connect via a named
        transition (see "Transition out" in the schema) — hard cuts are
        reserved for intentional pattern-interrupts, not the default.

      ── Scene 1 is always a HOOK ────────────────────────────────────────

      - First 1.5–3 seconds must earn the next 25.
      - DO NOT use "Welcome to...", "Today we'll talk about...",
        "In this video..." or a generic title card as the whole opening.
      - On-screen text scene 1: a single punchy teaser (≤ 10 words).
      - Narration scene 1: start with the hook line. No preamble.
      - Visual: dynamic entrance motion, not a static fade-in.

      ── Animation vocabulary (pick per scene) ───────────────────────────

      Every scene picks **1–2 techniques** from this list for its on-screen
      motion. Name them explicitly in the plan's `Animation:` field so the
      builder implements the right pattern from the remotion-best-practices
      skill. Avoid mixing more than 2 per scene — it muddles intent.

        - `typewriter`       — text appears one char at a time via string
                               slicing. Great for punchy hooks and quotes.
                               (see rules/text-animations.md — never use
                               per-character opacity.)
        - `fade-up`          — opacity 0→1 + small translateY 40→0, bezier
                               entrance. Dependable default.
        - `stagger-in`       — N elements enter one after the other on a
                               shared curve with 6–12 frame offsets.
        - `counter-pop`      — a number ticks up (spring-driven) from 0 to
                               the target. Use for big statistics.
        - `word-highlight`   — sweep a highlight behind a keyword mid-line.
                               (see rules/text-animations.md.)
        - `ken-burns`        — subtle 1.0→1.08 scale with 3% drift. Ideal
                               over images / screenshots.
        - `diagram-reveal`   — visual-diagrams nodes enter staggered, then
                               connections draw on. Only on diagram scenes.

      ── Mode-specific rules ─────────────────────────────────────────────

      ### mode = `hn` or `article`

      The video is ABOUT THE IDEAS IN THE ARTICLE. Treat it as an explainer.

      - Narration explains the concepts/findings of the article.
      - Hook angle: curiosity gap, surprising stat, counter-intuitive claim,
        or a concrete fact pulled from `article-body.md`.
      - **Do NOT reference** Hacker News, points, comments, submitter, "this
        hit the front page", "discussed online", or the source publication.
        The viewer doesn't care where you found it.
      - No CTA. End on a takeaway or an open question.
      - Tone: neutral, factual, clear. Think editorial, not promotional.

      ### mode = `marketing`

      The video is a PITCH for the product/brand described in article-body.md.

      - Narration frames the product as a solution. Lead with the problem.
      - Hook angle: the PROBLEM the product solves (surprising frustration,
        hidden cost, broken status quo), OR a crisp one-line of the
        transformation the product delivers.
      - Scenes 2–4: the strongest 2–3 benefits / capabilities from the
        brief. One idea per scene. Show product name, logo if available.
      - Final scene: CTA. Show the `url` or its domain (e.g. "archon.diy")
        and one concrete action ("Try it", "Install", "Book a demo" —
        pull from the brief's CTA field when possible). Keep ≤ 6 words.
      - **Do NOT fabricate features.** Only claim what article-body.md
        supports. No invented testimonials, star ratings, or usage stats.
      - **Do NOT reference** where you sourced the page (no "as seen on
        their homepage", no "according to their docs"). The product is
        the subject.
      - Tone: enthusiastic but factual. No "game-changer", "revolutionary",
        "unbelievable". Specificity beats superlatives.

      ### mode = `idea`

      The video is ABOUT THE TOPIC the user described in their prompt
      (now in `article-body.md`). Treat it as an explainer driven by the
      prompt's wording.

      - Narration explains the concepts/ideas the prompt asks about.
      - Hook angle: the most surprising, counter-intuitive, or
        curiosity-spiking framing of the topic the prompt names.
      - **Do NOT fabricate specifics.** Numbers, percentages, named
        products, testimonials, study citations, or product names that
        aren't implied by the prompt are out. If the prompt is broad
        ("how vector dbs work"), use generally accepted concepts; if it
        names specifics ("how Pinecone scales to 1B vectors"), respect
        them. When in doubt, stay conceptual.
      - **Do NOT reference the user, the prompt, or the request itself.**
        No "as you asked", "in this video we'll cover", "the topic you
        described". Make the video, not commentary on it.
      - **No CTA** unless the prompt explicitly asks for one (e.g. "make
        it a pitch for X" or "end with a call to subscribe"). Default
        ending is a takeaway, an open question, or a one-line summary.
      - Tone follows what the prompt suggests. Default to neutral,
        clear, educational. If the prompt says "fun" / "snappy" / "for
        beginners" / "deep technical", honor that.
      - Length: same 30–60s target as other modes. Pick depth accordingly
        — don't try to cover everything if the topic is broad.

      ── Diagram decision (all modes) ────────────────────────────────────

      Decide whether any scene benefits from a diagram component from the
      `visual-diagrams` skill. Err toward NO — only use diagrams when the
      source genuinely is about structure (systems, pipelines, comparisons,
      N-stage processes, connected components). For a marketing video, a
      diagram is a great fit when the product's value IS its architecture.

      ── Artifacts to write (all four required) ──────────────────────────

      1. `$ARTIFACTS_DIR/video-plan.md` — structured plan (schema below).

      2. `$ARTIFACTS_DIR/narration.json` — spoken script for TTS:

             {
               "composition_id": "<same as slug.json>",
               "fps": 30,
               "scenes": [
                 { "id": "scene1", "text": "<hook line, 12–25 words>" },
                 { "id": "scene2", "text": "..." }
               ]
             }

      3. `$ARTIFACTS_DIR/diagram-flag.json`:

             {
               "uses_diagrams": true | false,
               "reason": "<one sentence>",
               "scenes": [
                 { "id": "scene2", "type": "flow", "description": "..." }
               ]
             }

      4. `article-body.md` is ALREADY on disk (fetch-source wrote it). Don't
         overwrite unless you can meaningfully improve it.

      video-plan.md schema:

          # Video Plan

          **Mode:** hn | article | marketing | idea
          **Subject:** <title>
          **URL:** <url, or "(idea-mode)" if mode=idea>
          **Composition ID:** <composition_id from slug.json>  (1920x1080 @ 30fps)
          **Silent target duration:** <N>s
          **Uses diagrams:** yes | no
          **Final CTA:** (marketing only — one line)

          ## scene1 — HOOK — <short name> (nominal <start>s → <end>s)
          - **Beat:** <what the viewer learns>
          - **On-screen text:** "<≤10-word teaser>"
          - **Animation:** <1–2 techniques from the vocabulary above>
          - **Visuals:** <specific elements + how they relate to the narration>
          - **Diagram:** none | flow | hub-and-spoke | layered | comparison | infographic
          - **Transition out:** fade | slide-left | slide-right | slide-up | slide-down | wipe | clock-wipe | flip | hard-cut
              (`hard-cut` only for deliberate pattern-interrupts; default to
              `fade` or `slide-left` between normal scenes.)

          ## scene2 — ...

      Then print one-line-per-scene summary to stdout.
    depends_on: [fetch-source, ensure-remotion-project, derive-slug]
    idle_timeout: 600000

  # ── Layer 3: Audio layers (parallel, all opt-in) ───────────────────
  # Scripts write MP3s to the repo's `public/<media>/<CompId>/` and write
  # manifests to $ARTIFACTS_DIR/audio/ for downstream workflow consumption.

  - id: generate-audio
    bash: |
      set -euo pipefail
      uv run .archon/scripts/generate_voiceover.py "$ARTIFACTS_DIR"
    depends_on: [plan-video]
    timeout: 600000

  - id: generate-music
    bash: |
      set -euo pipefail
      uv run .archon/scripts/generate_music.py "$ARTIFACTS_DIR"
    depends_on: [plan-video, generate-audio]
    timeout: 600000

  - id: generate-sfx
    bash: |
      set -euo pipefail
      uv run .archon/scripts/generate_sfx.py "$ARTIFACTS_DIR"
    depends_on: [plan-video]
    timeout: 600000

  # ── Layer 4: Build composition ─────────────────────────────────────

  - id: build-composition
    command: remotion-build-composition
    depends_on: [generate-audio, generate-music, generate-sfx]
    trigger_rule: all_success
    context: fresh
    skills:
      - remotion-best-practices
      - visual-diagrams
    idle_timeout: 1200000

  # ── Layer 4.5: Regenerate compositions registry ────────────────────
  # Scans src/<Slug>/index.ts and writes src/compositions.gen.ts so
  # Root.tsx picks up every composition without needing Vite-only glob.

  - id: regenerate-registry
    bash: |
      set -euo pipefail

      # Find every directory under src/ that contains an index.ts, skip
      # obvious non-composition helpers (shared/, components/, lib/, utils/).
      OUT="src/compositions.gen.ts"
      TMP="$(mktemp)"

      echo "// GENERATED — do not edit. Regenerated by the \`regenerate-registry\`" > "$TMP"
      echo "// workflow node by scanning src/<Slug>/index.ts files." >> "$TMP"
      echo "import type React from 'react';" >> "$TMP"
      echo "" >> "$TMP"
      echo "type CompMeta = {" >> "$TMP"
      echo "  id: string;" >> "$TMP"
      echo "  component: React.ComponentType<any>;" >> "$TMP"
      echo "  width: number;" >> "$TMP"
      echo "  height: number;" >> "$TMP"
      echo "  fps: number;" >> "$TMP"
      echo "  durationInFrames: number;" >> "$TMP"
      echo "  defaultProps?: Record<string, unknown>;" >> "$TMP"
      echo "  calculateMetadata?: any;" >> "$TMP"
      echo "};" >> "$TMP"
      echo "" >> "$TMP"

      NAMES=()
      for d in src/*/; do
        name=$(basename "$d")
        case "$name" in
          shared|components|lib|utils|helpers) continue ;;
        esac
        if [ -f "$d/index.ts" ] || [ -f "$d/index.tsx" ]; then
          NAMES+=("$name")
          # import <name> from './<name>';  — local variable name lowercased
          local_name=$(printf '%s' "$name" | LC_ALL=C tr '[:upper:]' '[:lower:]' | LC_ALL=C sed -E 's/[^a-z0-9]//g')
          [ -z "$local_name" ] && local_name="comp$(printf '%s' "$name" | LC_ALL=C sed -E 's/[^a-zA-Z0-9]//g')"
          echo "import ${local_name}_meta from './${name}';" >> "$TMP"
        fi
      done

      echo "" >> "$TMP"
      echo "const entries: CompMeta[] = [" >> "$TMP"
      for name in "${NAMES[@]}"; do
        local_name=$(printf '%s' "$name" | LC_ALL=C tr '[:upper:]' '[:lower:]' | LC_ALL=C sed -E 's/[^a-z0-9]//g')
        [ -z "$local_name" ] && local_name="comp$(printf '%s' "$name" | LC_ALL=C sed -E 's/[^a-zA-Z0-9]//g')"
        echo "  ${local_name}_meta," >> "$TMP"
      done
      echo "];" >> "$TMP"
      echo "" >> "$TMP"
      echo "export default entries;" >> "$TMP"

      mv "$TMP" "$OUT"
      echo "Registered compositions: ${#NAMES[@]}"
      for n in "${NAMES[@]}"; do echo "  - $n"; done
    depends_on: [build-composition]
    timeout: 15000

  # ── Layer 5: QA review (read-only intent) ──────────────────────────

  - id: qa-review
    prompt: |
      You are a Remotion code reviewer. **Review only — do NOT edit source
      files under `./src/<CompId>/` in the repo.** You may Write review
      artifacts to `$ARTIFACTS_DIR/qa-findings.md` and run Bash for compile
      checks. Treat the source tree as read-only.

      Project root: repo root (cwd)
      Plan:        `$ARTIFACTS_DIR/video-plan.md`
      Slug:        `$ARTIFACTS_DIR/slug.json` — composition_id + fs_slug
      Diagram:     `$ARTIFACTS_DIR/diagram-flag.json`
      Voice:       `$ARTIFACTS_DIR/audio/voice-manifest.json`    (may be absent)
      Music:       `$ARTIFACTS_DIR/audio/music-manifest.json`    (may be absent)
      SFX:         `$ARTIFACTS_DIR/audio/sfx-manifest.json`      (may be absent)
      Brand:       `.archon/brand.yaml`                          (may be absent)

      First, detect all the flags (audio layers, diagram flag, source mode):

          MODE=$(jq -r '.mode' "$ARTIFACTS_DIR/article.json")      # hn | article | marketing | idea
          [ -f "$ARTIFACTS_DIR/audio/voice-manifest.json" ] && VOICED=true  || VOICED=false
          [ -f "$ARTIFACTS_DIR/audio/music-manifest.json" ] && MUSIC=true   || MUSIC=false
          [ -f "$ARTIFACTS_DIR/audio/sfx-manifest.json"   ] && SFX=true     || SFX=false
          USES_DIAGRAMS=$(jq -r '.uses_diagrams' "$ARTIFACTS_DIR/diagram-flag.json" 2>/dev/null || echo false)

      Base checks (always):
      1. **Compiles.** `npx --yes tsc --noEmit` from repo root.
      2. **Registered.** Composition ID from slug.json appears in
         `src/compositions.gen.ts` (regenerated by `regenerate-registry`
         right before QA). Verify `src/<CompId>/index.ts` exports a valid
         default composition meta.
      3. **Plan alignment.** Scene IDs + nominal durations match the plan.
      4. **Hook quality.** Scene 1 is a real hook — does NOT open with
         "Welcome" / "Today" / "In this video" and is NOT just the subject
         title as a card. On-screen text ≤ 10 words.
      5. **Remotion best practices** (use `remotion-best-practices` skill).
      6. **Repo hygiene.** The new composition is isolated under its own
         `src/<CompId>/` dir. It did NOT edit any other composition's files,
         did NOT modify `src/Root.tsx` or `src/compositions.gen.ts`, and did
         NOT touch shared code in `src/shared/` unless it vendored new
         helpers (which is OK).

      Animation quality checks (always, from remotion-best-practices skill):
      6a. **Transitions wired via `@remotion/transitions`.** If the plan's
          `Transition out:` field specifies anything other than `hard-cut`
          for a scene, the composition MUST use `<TransitionSeries>` +
          the matching preset (`fade`, `slide`, `wipe`, `clockWipe`, `flip`)
          at that boundary. Hand-animated opacity fade on adjacent
          `<Sequence>`s is **HIGH-severity** — it's the anti-pattern the
          skill warns against. If every plan transition is `hard-cut`,
          plain Sequences are fine.
      6b. **No per-character opacity for text animation.** Typewriter
          effects MUST use string slicing (`text.slice(0, typedChars)`).
          Per-character opacity is **HIGH-severity**.
      6c. **Named Bézier easing.** `interpolate()` calls should specify
          `easing: Easing.bezier(...)` or one of the preset curves
          (`Easing.out`, `Easing.cubic`, etc.). `Easing.linear` as a
          default is **LOW-severity** (allowed only for loops or
          deliberate linear motion).
      6d. **`premountFor` on every Sequence.** `<Sequence>` and
          `<TransitionSeries.Sequence>` should declare `premountFor`.
          Missing premount on any scene is **LOW-severity** (multiple
          misses = MED).
      6e. **Seconds × fps, not raw frame literals.** Motion durations in
          scene code should read `0.6 * fps`, `1.2 * fps`, etc. Raw frame
          literals > 30 (other than values from the audio manifest) are
          **LOW-severity** per occurrence, MED if systematic.
      6f. **Fonts via `@remotion/google-fonts`.** If the composition uses
          a non-system font, it must `loadFont()` from `@remotion/google-fonts`
          with explicit `weights` and `subsets`. Using `fontFamily: "Inter"`
          as a raw string without calling `loadFont` is **MED-severity**.
      6g. **Composed-progress pattern.** When a scene animates 2+ properties
          on the same beat, it should derive them from a single normalized
          progress variable (the `rules/timing.md` pattern). Duplicated
          full `interpolate(frame, ...)` calls for the same window are
          **LOW-severity**. No-op ranges like `[1.0, 1.0]` are HIGH.

      Mode-specific content checks:

      When MODE is `hn` or `article`:
      7a. **No source-platform references.** Nothing in narration or on-screen
          text mentions Hacker News, points, comments, submitter, upvotes,
          "as discussed online", or the source publication. HIGH-severity if
          violated.
      7b. **No CTA.** The video ends on a takeaway or open question, not a
          "Visit X" / "Try Y" call-to-action.

      When MODE is `marketing`:
      7c. **No fabricated features.** Every product claim traces to
          `$ARTIFACTS_DIR/article-body.md`. Invented capabilities,
          testimonials, star ratings, or usage stats are HIGH-severity.
      7d. **Final scene is a CTA.** The last scene shows the product's URL
          or domain plus one concrete action. Missing CTA is MED-severity.
      7e. **No hype language.** Flag "game-changer", "revolutionary",
          "unbelievable", "insane", "mind-blowing" and similar empty
          superlatives as LOW-severity.
      7f. **No source-page references.** Don't say "as seen on their
          homepage" / "according to their docs". The product is the subject,
          not the page.

      When MODE is `idea`:
      7g. **No prompt / user / meta references.** Nothing in narration or
          on-screen text should say "the prompt", "as you asked", "in this
          video we'll cover", "the topic you described", or otherwise
          reference the user-as-author. HIGH-severity if violated.
      7h. **No fabricated specifics.** Concrete numbers, percentages,
          named products, named studies, testimonials, or usage stats
          that are NOT present or directly implied in
          `$ARTIFACTS_DIR/article-body.md` (which contains the user's
          verbatim prompt) are HIGH-severity.
      7i. **Topical coherence.** Every scene must advance the topic the
          prompt named. Off-topic detours or padding scenes are
          MED-severity.
      7j. **No CTA** unless the prompt explicitly requested one. A "Visit
          X" / "Try Y" / "Subscribe" final scene that has no support in
          the prompt is MED-severity.

      Voiced-mode checks (when VOICED=true):
      8. Every scene in voice-manifest has a matching `<Audio>` with the
         correct `staticFile()` path.
      9. Duration source of truth is `calculateMetadata` using
         `getAudioDuration(staticFile(...))` per scene. Hardcoded frame
         constants are HIGH-severity.
     10. No verbatim double-narration on screen.

      Music-mode checks (when MUSIC=true):
     11. A single `<Audio>` reads `music-manifest.path` via `staticFile()`.
     12. Music audio has `volume` set (manifest default ~0.2). Unducked
         music under narration is HIGH-severity.
     13. Music audio is placed at composition level so it spans all scenes.

      SFX-mode checks (when SFX=true):
     14. Intro whoosh, outro stinger, and N-1 transition ticks are each
         wired with a Sequence offset matching the anchor.
     15. No SFX mid-scene unless the plan explicitly required it.

      Diagram-mode checks (when USES_DIAGRAMS=true):
     16. Each flagged scene uses the appropriate `visual-diagrams` component.
     17. Node/connection styling follows visual-diagrams rules.

      Write findings to `$ARTIFACTS_DIR/qa-findings.md`, one section per
      issue, prefixed `CRITICAL` | `HIGH` | `MED` | `LOW`.

      Verdict:
      - `pass`            — zero CRITICAL and zero HIGH issues
      - `needs-iteration` — at least one CRITICAL or HIGH issue

      Your final message must be the JSON verdict.
    depends_on: [regenerate-registry]
    context: fresh
    skills:
      - remotion-best-practices
      - visual-diagrams
    output_format:
      type: object
      properties:
        verdict:
          type: string
          enum: [pass, needs-iteration]
        modes:
          type: object
          properties:
            voiced:
              type: string
              enum: ["true", "false"]
            music:
              type: string
              enum: ["true", "false"]
            sfx:
              type: string
              enum: ["true", "false"]
            diagrams:
              type: string
              enum: ["true", "false"]
        critical_count:
          type: number
        high_count:
          type: number
        med_count:
          type: number
        low_count:
          type: number
        summary:
          type: string
      required: [verdict, summary]

  # ── Layer 6: Iterate (conditional) ─────────────────────────────────

  - id: iterate
    command: remotion-iterate
    depends_on: [qa-review]
    when: "$qa-review.output.verdict == 'needs-iteration'"
    context: fresh
    skills:
      - remotion-best-practices
      - visual-diagrams
    idle_timeout: 900000

  # ── Layer 7: Verify ────────────────────────────────────────────────

  - id: verify
    bash: |
      set -euo pipefail
      COMP_ID=$(jq -r '.composition_id' "$ARTIFACTS_DIR/slug.json")

      echo "=== tsc --noEmit ==="
      npx --yes tsc --noEmit

      echo ""
      echo "=== remotion compositions ==="
      npx --yes remotion compositions

      echo ""
      echo "Composition ID for downstream render: $COMP_ID"
    depends_on: [qa-review, iterate]
    trigger_rule: none_failed_min_one_success
    timeout: 180000

  # ── Layer 8: Render + archive (opt-out) ────────────────────────────

  - id: archive-render
    bash: |
      set -euo pipefail

      RENDER="${RENDER_ENABLED:-true}"
      if [ "$RENDER" = "false" ] || [ "$RENDER" = "0" ]; then
        echo "RENDER_ENABLED=$RENDER — skipping render + archive."
        exit 0
      fi

      SLUG=$(jq -r '.fs_slug' "$ARTIFACTS_DIR/slug.json")
      COMP_ID=$(jq -r '.composition_id' "$ARTIFACTS_DIR/slug.json")
      ARCHIVE_DIRNAME=$(jq -r '.archive_dirname' "$ARTIFACTS_DIR/slug.json")

      DEST="videos/$ARCHIVE_DIRNAME"
      mkdir -p "$DEST"
      mkdir -p out

      echo "=== remotion render $COMP_ID ==="
      npx --yes remotion render "$COMP_ID" "out/$SLUG.mp4"

      cp "out/$SLUG.mp4" "$DEST/$SLUG.mp4"

      # Copy logic artifacts alongside the mp4 for posterity.
      for f in "$ARTIFACTS_DIR/video-plan.md" \
               "$ARTIFACTS_DIR/narration.json" \
               "$ARTIFACTS_DIR/qa-findings.md" \
               "$ARTIFACTS_DIR/article.json" \
               "$ARTIFACTS_DIR/article-body.md" \
               "$ARTIFACTS_DIR/audio/voice-manifest.json" \
               "$ARTIFACTS_DIR/audio/music-manifest.json" \
               "$ARTIFACTS_DIR/audio/sfx-manifest.json"; do
        [ -f "$f" ] && cp "$f" "$DEST/" || true
      done

      INDEX="videos/index.md"
      if [ ! -f "$INDEX" ]; then
        printf '# Video archive\n\n| Date | Title | URL | Verdict | Folder |\n|---|---|---|---|---|\n' > "$INDEX"
      fi
      TITLE=$(jq -r '.title' "$ARTIFACTS_DIR/article.json")
      URL=$(jq -r '.url // ""' "$ARTIFACTS_DIR/article.json")
      MODE=$(jq -r '.mode' "$ARTIFACTS_DIR/article.json")
      if [ -z "$URL" ]; then
        case "$MODE" in
          idea) URL="(idea)" ;;
          hn)   URL="(Ask HN)" ;;
          *)    URL="-" ;;
        esac
      fi
      DATE=$(jq -r '.date' "$ARTIFACTS_DIR/slug.json")
      VERDICT="$qa-review.output.verdict"
      TITLE_SAFE=$(printf '%s' "$TITLE" | sed 's/|/\\|/g')
      printf '| %s | %s | %s | %s | [%s](%s) |\n' \
        "$DATE" "$TITLE_SAFE" "$URL" "$VERDICT" \
        "$ARCHIVE_DIRNAME" "$ARCHIVE_DIRNAME" >> "$INDEX"

      echo "Archived: $DEST"
    depends_on: [verify]
    timeout: 600000

  # ── Layer 9: Receipt ───────────────────────────────────────────────

  - id: summarize
    prompt: |
      Emit a short receipt under 200 words, plain text, no code fences, no
      leading or trailing prose. Match this structure exactly:

          Remotion video
          Mode:      <$fetch-source.output.mode>
          Subject:   <$fetch-source.output.title>
          URL:       <$fetch-source.output.url>
          Comp ID:   <composition_id from $derive-slug.output>
          Audio:     voiced=<$qa-review.output.modes.voiced> music=<..modes.music> sfx=<..modes.sfx> diagrams=<..modes.diagrams>
          Verdict:   <$qa-review.output.verdict>

          Archive:   ./videos/<archive_dirname from $derive-slug.output>/
          Source:    ./src/<composition_id>/
          Preview:   npx remotion studio
          Render:    npx remotion render <composition_id>

          QA summary:
          <one-paragraph: $qa-review.output.summary>

      Context substituted:
      - Source:       $fetch-source.output
      - Slug JSON:    $derive-slug.output
      - QA modes:     $qa-review.output.modes
      - QA verdict:   $qa-review.output.verdict
      - QA summary:   $qa-review.output.summary
      - Archive stdout:
      $archive-render.output
    depends_on: [archive-render]
    model: haiku
    allowed_tools: []
